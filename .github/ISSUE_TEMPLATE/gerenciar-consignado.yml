name: Gerenciar relatório de consignados
description: Cadastrar, editar ou excluir um registro sem manipular o JSON
title: "[ADMIN CONSIGNADOS] "
body:
  - type: markdown
    attributes:
      value: |
        Preencha somente os campos necessários para a operação escolhida.
        Para editar ou excluir, copie o identificador exibido no painel administrativo.

  - type: dropdown
    id: operacao
    attributes:
      label: Operação
      description: Escolha o que deseja fazer.
      options:
        - Cadastrar
        - Editar
        - Excluir
    validations:
      required: true

  - type: input
    id: identificador
    attributes:
      label: Identificador
      description: "Obrigatório para editar ou excluir. Exemplo: cons-2026-05"
      placeholder: cons-2026-05

  - type: input
    id: ano
    attributes:
      label: Ano
      description: Obrigatório para cadastrar ou editar.
      placeholder: "2026"

  - type: dropdown
    id: mes
    attributes:
      label: Mês
      description: Obrigatório para cadastrar ou editar.
      options:
        - Não se aplica
        - Janeiro
        - Fevereiro
        - Março
        - Abril
        - Maio
        - Junho
        - Julho
        - Agosto
        - Setembro
        - Outubro
        - Novembro
        - Dezembro

  - type: textarea
    id: descricao
    attributes:
      label: Descrição
      description: Obrigatória para cadastrar ou editar. Não inclua dados pessoais.
      placeholder: Relatório de consignados - Jun/2026

  - type: input
    id: url
    attributes:
      label: URL do documento
      description: Obrigatória para cadastrar ou editar. Use um link HTTPS do Google Drive.
      placeholder: https://drive.google.com/file/d/.../view

  - type: textarea
    id: justificativa
    attributes:
      label: Justificativa administrativa
      description: Explique brevemente por que o registro precisa ser cadastrado, editado ou excluído.
      placeholder: Publicação do relatório mensal validado pelo setor responsável.
    validations:
      required: true

  - type: checkboxes
    id: confirmacao
    attributes:
      label: Confirmação
      options:
        - label: Confirmo que revisei os dados e que o documento não contém informação pessoal ou sigilosa.
          required: true
